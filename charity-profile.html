<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Hospital Profile</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

    <div class="dashboard">
        <aside class="sidebar">
            <h2>AidLink</h2>
            <ul>
                <li><a href="charity.html">Request Devices</a></li>
                <li><a href="charity-requests.html">Track Requests</a></li>
                <li><a href="upload-device.html">Upload Device</a></li>
            </ul>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </aside>

        <main class="main-content">

            <div class="form-section">
                <h2>charity Information</h2>
                <p>charity Name: Alexandria Hospital</p>
                <p>Email: hospital@gmail.com</p>
                <p>Phone: 01000000000</p>
                <p>Address: Alexandria</p>
            </div>

            <div class="cards">
                <div class="card">
                    <h3>12</h3>
                    <p>Total Requests</p>
                </div>

                <div class="card">
                    <h3>7</h3>
                    <p>Approved</p>
                </div>
                <script>

                    const charity =
                        JSON.parse(localStorage.getItem("charity"));

                    document.getElementById("charityName")
                        .innerText = charity.name;

                    document.getElementById("charityEmail")
                        .innerText = charity.email;

                </script>


</body>

</html>
